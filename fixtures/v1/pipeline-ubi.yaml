base: registry.access.redhat.com/ubi9/ubi-minimal
statements:
  - id: download-file
    name: file
    options:
      path: /home/somebody/
      uri: https://${HOST}/ko-build/ko/releases/download/v0.18.1/ko_0.18.1_Linux_x86_64.tar.gz?archive=false
      executable: true
    depends-on:
      - set-host
      - set-checksum
  - id: set-host
    name: env
    options:
      HOST: "github.com"
  - id: set-checksum
    name: env
    options:
      CHECKSUM: "cf04af86dc085268c5f4470fbae49b18afbc221b78096aab842d934a76bad0ab"
      PATH: "${PATH}:/foo/bar"
      HOST_USED: "${HOST:-error}"
      FOO: "${BAR:-bar}"
      SHELL: /bin/bash
config:
  overwrite-entrypoint: true
  entrypoint:
    - ${SHELL}
